name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-cli:
    name: Build CLI Node
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.7'

      - name: Build CLI
        run: make release-cli

      - name: Upload CLI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bin
          path: dist/bin/

  build-gui-macos:
    name: Build GUI (macOS)
    runs-on: macos-latest
    needs: build-cli
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.7'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          name: bin
          path: dist/bin/

      - name: Build GUI
        run: make release-gui

      - name: Zip macOS app
        run: |
          cd dist/apps
          zip -r p2p-gui-macos.zip p2p-gui-macos.app

      - name: Upload macOS GUI artifact
        uses: actions/upload-artifact@v4
        with:
          name: apps-macos
          path: dist/apps/p2p-gui-macos.zip

  build-gui-windows:
    name: Build GUI (Windows)
    runs-on: windows-latest
    needs: build-cli
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.7'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          name: bin
          path: dist/bin/

      - name: Build GUI
        run: |
          mkdir dist\apps
          cd cmd\p2p-desktop
          wails build -platform windows/amd64 -ldflags="-s -w" -nsis
          copy build\bin\p2p-desktop-amd64-installer.exe ..\..\dist\apps\p2p-gui-windows-setup.exe
        shell: cmd

      - name: Upload Windows GUI artifact
        uses: actions/upload-artifact@v4
        with:
          name: apps-windows
          path: dist/apps/p2p-gui-windows-setup.exe

  release:
    name: Publish Release
    needs: [build-cli, build-gui-macos, build-gui-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/release-assets/bin/*
            dist/release-assets/apps-macos/*
            dist/release-assets/apps-windows/*
          generate_release_notes: true
